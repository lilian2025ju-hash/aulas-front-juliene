<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre uso de títulos</title>
</head>
<body>
    <!--COMENTÁRIOS/ ANOTAÇÕES DE HTML ( ATALHO CTRL ;)-->
        <!-- A utilização de tags de títulos (heading) segue uma lógica de hierarquia.Exemplo: para ter um <h3>, necessariamente devemos ter um <h2> e um <h1>. Obs: vai de <h1> até <h6> -->
    <h1>Juliene Lilian de Araujo  </h1>
        <h2>Título 2</h2>
        <h3>Dados Pessoais </h3>
        <h4>Experiências</h4>
        <h3>Empresa A</h3>
        <h3>Empresa B</h3>
     
        <h5>Formação </h5>
        <h3>Escola 1</h3>
        <h3>Escola 2</h3>
        <h6>Informações Adicionais</h6>
    
</body>
</html>
