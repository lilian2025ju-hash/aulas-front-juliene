<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <style>
        .container{
            border: 2px dashed#ccc;
            padding: 10px;
            display: grid;
            gap: 10px;
            
            /* 
             /* configuração Grid */    
                      /*È comum o uso da unidade de medida "fr"(fração) para tornar flexivel o tamanho dos itens do grid    grid-template comuns 100px repeat(2, 1 fr)*/
                      
             grid-template-columns: repeat( 3, 1fr);
             grid-template-rows: 80px 100px;
        }

        .item{
            background-color: #8df58d;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }

        .a{
            grid-row-start: 1;
            grid-row-end: 3;
            background-color: rgb(235, 198, 15);
            grid-row:1 / 3 ;
        }

        .b{
            background-color: rgb(122, 122, 220);
            grid-column-start: 2;
            grid-column-end: 4;
            /* abreviado */
        }

        .e{
            grid-column: 1/ -1;
            background-color: rgb(220, 127, 220);
        }
    </style>
</head>
<body>

    <h1>Grid Layout</h1>
    <p>Grid Layout é um sistema nativo do Css para estruturar e organizar layout bidimensional, ou seja, que utilize <b>linhas</b> e <b>colunas</b> ao mesmo tempo</p>
    

    <div class="container">
        <div class="item a">A</div>
        <div class="item b">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item e">E</div>
    </div>





</body>

</html>
