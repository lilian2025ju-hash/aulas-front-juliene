<!DOCTYPE html>
<html lang="pt-br">

<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio flebox</title>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;

        }

        body {
            color: #111111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: rgb(247, 248, 248);

        }

        nav {
            background-color: rgb(221, 253, 107);
            padding: 10px;
            width: 500px;
            border-block-end: solid 1px;
            min-height: 10px;

            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-evenly;
            flex-direction: row;
            
            font-weight: bold;
            color: black;

            a {
                text-decoration: none;
                color: #19191a;
                margin-inline: 5px;


            }


        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 1.2em;
            margin-block: 2rem;
            background-color: white;
            height: 600px;
            align-items:center;
            flex-wrap: wrap;
            padding-block-start: 10px;


        }

        .card {
            width: 250px;
            min-height: 200px;
            padding: 1rem;
            background-color: white;
            box-shadow: rgba(0, 0, 0, 0.594) 0 0 10px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            background-color: rgb(163, 232, 232);
        }
    </style>
    <header>
        <h1>Exercício Flexbox</h1>
        <nav>
            <a href="Inicio">Início</a>
            <a href="Notícias">Notícias</a>
            <a href="Cursos">Cursos</a>
            <a href="Contato">Contato</a>
        </nav>
    </header>


</head>

<body>


    <main class="cards">
        <article class="card">
            <h2>Nova IA no Mercado</h2>
            <p>Lorem, ipsum dolor </p>
        </article>

        <article class="card">
            <h2> Css Moderno</h2>
            <p>Lorem ipsum dolor, sit amet consectetur.</p>
        </article>

        <article class="card">
            <h2>JavaScript 2026</h2>
            <p>Lorem ipsum dolor sit amet consecte.</p>
        </article>

        <article class="card">
            <h2>Frameworksnem alta</h2>
            <p> Lorem, ipsum dolor sit amet consectetur adipisicing.</p>
        </article>
    </main>

</body>

</html>
